name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_pgsql, pgsql, mbstring, exif, pcntl, bcmath, gd, zip
          coverage: none
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict

      # Remove Nova (paid package) before install so public CI doesn't need credentials.
      # Full tests are run privately with Nova until the Pro/Core split lands.
      - name: Remove Nova for public CI
        run: |
          composer remove --no-update laravel/nova laravel/nova-devtool || true
          rm -f composer.lock

      - name: Install composer dependencies (minus Nova)
        run: composer install --prefer-dist --no-progress --no-interaction --ignore-platform-reqs

      - name: Run Laravel Pint (lint)
        run: vendor/bin/pint --test

  # TODO: re-enable once Nova is made optional (issue #TBD)
  # test:
  #   name: Tests (requires Nova)
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #     ... etc
